<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muneeb Ur Tarantino | Systems Engineer Portfolio</title>
    <meta name="description" content="Muneeb Ur Tarantino - Systems Engineer specializing in Firmware Forensics, Binary Translation x86 to ARM64, Rust, C++, Kotlin. Based in Hungen, Germany.">
    <meta name="keywords" content="Muneeb Ur Tarantino, Systems Engineer, Firmware Forensics, Binary Translation, x86 ARM64, Rust, C++, Kotlin">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #0a0e14;
            color: #00ff66;
            font-family: 'Courier New', Courier, monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .welcome-container {
            width: 100%;
            max-width: 700px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-ascii {
            color: #e95420;
            font-size: 0.65rem;
            line-height: 1.2;
            margin-bottom: 24px;
            white-space: pre;
            user-select: none;
        }

        @media (max-width: 600px) {
            .welcome-ascii { font-size: 0.45rem; }
        }

        .welcome-title {
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 8px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0,255,102,0.2);
        }

        .welcome-subtitle {
            color: #8b949e;
            font-size: 0.95rem;
            margin-bottom: 40px;
        }

        .interface-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 600px) {
            .interface-grid { grid-template-columns: 1fr; }
        }

        .interface-card {
            background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 28px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .interface-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--accent, #00ff66);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .interface-card:hover::before { opacity: 1; }

        .interface-card:hover {
            border-color: var(--accent, #00ff66);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 20px var(--glow, rgba(0,255,102,0.1));
            transform: translateY(-4px);
        }

        .interface-card:active { transform: scale(0.98); }

        .interface-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
        }

        .interface-label {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .interface-desc {
            font-size: 0.8rem;
            color: #8b949e;
            line-height: 1.4;
        }

        .interface-status {
            margin-top: 12px;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 12px;
            background-color: rgba(0,255,102,0.08);
            color: var(--accent, #00ff66);
            border: 1px solid rgba(0,255,102,0.15);
        }

        .welcome-footer {
            color: #484f58;
            font-size: 0.8rem;
        }

        .welcome-footer .cursor {
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Boot overlay for transitions */
        .boot-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #0a0e14;
            z-index: 9999;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #00ff66;
            font-family: 'Courier New', monospace;
        }

        .boot-overlay.active { display: flex; }

        .boot-line {
            margin-bottom: 6px;
            opacity: 0;
            animation: bootFade 0.1s forwards;
        }

        @keyframes bootFade { to { opacity: 1; } }

        .boot-progress {
            width: 280px;
            height: 3px;
            background: #1a1a1a;
            border-radius: 2px;
            margin-top: 16px;
            overflow: hidden;
        }

        .boot-progress-fill {
            height: 100%;
            background: #00ff66;
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0,255,102,0.5);
        }
    </style>
</head>
<body>

<div class="boot-overlay" id="boot-overlay">
    <div id="boot-content"></div>
    <div class="boot-progress"><div class="boot-progress-fill" id="boot-progress-fill"></div></div>
</div>

<div class="welcome-container" id="welcome-container">
    <div class="welcome-ascii" id="welcome-ascii"></div>
    <div class="welcome-title" id="welcome-title">Loading...</div>
    <div class="welcome-subtitle" id="welcome-subtitle">Initializing portfolio environment...</div>

    <div class="interface-grid" id="interface-grid"></div>

    <div class="welcome-footer" id="welcome-footer">
        <span class="cursor">_</span>
    </div>
</div>

<script>
let DATA = null;

fetch('data.json')
    .then(r => r.json())
    .then(d => {
        DATA = d;
        renderWelcome();
    })
    .catch(() => {
        document.getElementById('welcome-title').textContent = 'Error loading data.json';
    });

function renderWelcome() {
    const o = DATA.orchestrator;

    // ASCII art
    const ascii = `███╗   ███╗      ████████╗ █████╗ ██████╗  █████╗ ███╗   ██╗████████╗██╗███╗   ██╗ ██████╗ 
████╗ ████║      ╚══██╔══╝██╔══██╗██╔══██╗██╔══██╗████╗  ██║╚══██╔══╝██║████╗  ██║██╔═══██╗
██╔████╔██║  █████╗ ██║   ███████║██████╔╝███████║██╔██╗ ██║   ██║   ██║██╔██╗ ██║██║   ██║
██║╚██╔╝██║  ╚════╝ ██║   ██╔══██║██╔══██╗██╔══██║██║╚██╗██║   ██║   ██║██║╚██╗██║██║   ██║
██║ ╚═╝ ██║         ██║   ██║  ██║██║  ██║██║  ██║██║ ╚████║   ██║   ██║██║ ╚████║╚██████╔╝
╚═╝     ╚═╝         ╚═╝   ╚═╝  ╚═╝╚═╝  ╚═╝╚═╝  ╚═╝╚═╝  ╚═══╝   ╚═╝   ╚═╝╚═╝  ╚═══╝ ╚═════╝ 
`;
    document.getElementById('welcome-ascii').textContent = ascii;
    document.getElementById('welcome-title').textContent = o.welcome_title;
    document.getElementById('welcome-subtitle').textContent = o.welcome_subtitle;
    document.getElementById('welcome-footer').innerHTML = o.footer + ' <span class="cursor">_</span>';

    const grid = document.getElementById('interface-grid');
    o.options.forEach(opt => {
        const card = document.createElement('a');
        card.className = 'interface-card';
        card.href = '#';
        card.style.setProperty('--accent', opt.color);
        card.style.setProperty('--glow', opt.color + '20');
        card.innerHTML = `
            <div class="interface-icon">${opt.icon}</div>
            <div class="interface-label">${opt.label}</div>
            <div class="interface-desc">${opt.description}</div>
            <div class="interface-status">● Online</div>
        `;
        card.addEventListener('click', (e) => {
            e.preventDefault();
            launchWithBoot(opt);
        });
        grid.appendChild(card);
    });
}

function launchWithBoot(option) {
    const overlay = document.getElementById('boot-overlay');
    const content = document.getElementById('boot-content');
    const fill = document.getElementById('boot-progress-fill');

    overlay.classList.add('active');
    content.innerHTML = '';
    fill.style.width = '0%';

    const lines = option.boot_lines || [];
    let i = 0;

    function showLine() {
        if (i < lines.length) {
            const div = document.createElement('div');
            div.className = 'boot-line';
            div.style.animationDelay = '0s';
            div.textContent = lines[i];
            content.appendChild(div);
            fill.style.width = ((i + 1) / lines.length * 100) + '%';
            i++;
            setTimeout(showLine, 400);
        } else {
            setTimeout(() => {
                window.location.href = option.href;
            }, 300);
        }
    }
    showLine();
}
</script>

</body>
</html>
