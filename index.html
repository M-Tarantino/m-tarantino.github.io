        .command { color: #ffffff; }
        .accent { color: #ffbd2e; }

            margin-top: 20px;
            display: flex;

            gap: 10px;

            padding-top: 15px;

        .cli-btn {

            color: #00ff66;
            border: 1px solid #30363d;
            padding: 8px 14px;

            font-family: 'Courier New', Courier, monospace;
            border-radius: 4px;

            font-size: 0.9rem;

            color: #0c0f12;
            box-shadow: 0 0 10px rgba(0,255,102,0.5);

        .output-block {
            margin-top: 15px;
            color: #c9d1d9;
            white-space: pre-line;
        }
        .hidden {
            display: none !important;
        }
        .boot-line {
            margin-bottom: 4px;
        }
    </style>
</head>

    "[    2.000000] Access Granted. Launching multi-tier interactive shell environment...\n"
];

const bootScreen = document.getElementById('boot-screen');
const mainTerminal = document.getElementById('main-terminal');
let lineIndex = 0;

function printBootLine() {
    if (lineIndex < bootLines.length) {
        const div = document.createElement('div');
        div.className = 'boot-line';
        div.innerText = bootLines[lineIndex];
        bootScreen.appendChild(div);
        lineIndex++;
        setTimeout(printBootLine, 200);
    } else {
        setTimeout(() => {
            bootScreen.classList.add('hidden');
            mainTerminal.classList.remove('hidden');
        }, 400);
    }
}

window.onload = printBootLine;
