function printBootLine() {
    if (lineIndex < bootLines.length) {
        const div = document.createElement('div');
        div.className = 'boot-line';
        div.innerText = bootLines[lineIndex];
        bootScreen.appendChild(div);
        lineIndex++;
        setTimeout(printBootLine, 150);
    } else {
        setTimeout(() => {
            bootScreen.classList.add('hidden');
            mainTerminal.classList.remove('hidden');
            inputField.focus();
        }, 300);
    }
}

});

// Simulate tying effect in the input box when a button is clicked
function animateAndExecute(action) {
    const targetCommand = commandMap[action] || action;
    inputField.value = '';
    let i = 0;
    
    function typeChar() {
        if (i < targetCommand.length) {
            inputField.value += targetCommand.charAt(i);
            i++;
            setTimeout(typeChar, 40); // speed of automated typing animation
        } else {
            setTimeout(() => {
                processCommand(targetCommand);
            }, 150);
        }
    }
    typeChar();
}

// Listen for physical Keyboard Enter press

});
